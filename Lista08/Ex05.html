<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="exibir()">Números cabalísticos</button>

    <div id="resultado"></div><br>
</body>
<script>
    function exibir(){
        let count = 1;

        while(count <= 30){
            count == 3 || count == 4 || count == 7 || count == 10 || count == 12 ? `` : resultado.innerHTML += `${count}<br>`;

            count++;
        }
    }
</script>
</html>
