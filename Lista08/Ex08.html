<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="frase" placeholder="Digite uma frase">
    <input type="text" id="numero" placeholder="Digite um numero">
    <button onclick="papagaiar()">Papagaio</button>

    <div id="resultado"></div><br>
</body>
<script>
    function papagaiar(){
        let fraseUsuario = frase.value;
        let num = Number(numero.value);
        let count = 1;

        while(count <= num){
            alert(fraseUsuario);

            count++;
        }
    }
</script>
</html>
