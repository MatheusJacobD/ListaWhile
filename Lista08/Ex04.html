<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="contar()">S2 pares</button>

    <div id="resultado"></div><br>
</body>
<script>
    function contar(){
        let count = 1;

        while(count <= 100){
            count % 2 == 0 ? resultado.innerHTML += `${count}<br>` : ``;

            count++;
        }
    }
</script>
