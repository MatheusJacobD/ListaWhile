<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="exibir()">Viva o 7!</button>

    <div id="resultado"></div><br>
</body>
<script>
    function exibir(){
        let count = 1;
        let num = 0;

        while(num < 20 || num > 100){
            num = Number(prompt("Digite um número: "));
        }

        while(count <= num){
            count % 7 == 0 ? resultado.innerHTML += `${count}<br>` : ``;
            count++;
        }
    }
</script>
</html>
